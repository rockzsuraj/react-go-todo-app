services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-todos}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/api
      dockerfile: backend.Dockerfile
      target: ${ENV:-development}
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
    volumes:
      - ./apps/api:/app
      - air_tmp:/app/tmp
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/web
      dockerfile: frontend.Dockerfile
      target: ${ENV:-development}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8080}
      - REACT_APP_FRONTEND_URL=${REACT_APP_FRONTEND_URL:-http://localhost:3000}
      - ENV=${ENV:-development}
      - PORT=3000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  air_tmp:
