name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
        
    - name: Install dependencies
      run: |
        cd apps/web
        npm ci
        
    - name: Build
      run: |
        cd apps/web
        npm run build
      env:
        REACT_APP_API_URL: https://qnlhgaymddnazecbtsau.supabase.co/rest/v1
        REACT_APP_SUPABASE_URL: https://qnlhgaymddnazecbtsau.supabase.co
        REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: ./apps/web/build
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2