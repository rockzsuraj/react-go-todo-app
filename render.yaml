services:
  - type: web
    name: react-todos-backend
    env: docker
    dockerfilePath: ./backend.Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: react-todos-db
          property: connectionString
    
  - type: web
    name: react-todos-frontend
    env: docker
    dockerfilePath: ./frontend.Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://react-todos-backend.onrender.com/api

databases:
  - name: react-todos-db
    databaseName: todos
    user: postgres