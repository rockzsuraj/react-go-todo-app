services:
  - type: web
    name: todo-backend
    env: go
    buildCommand: cd apps/api && go build -o main ./cmd/server
    startCommand: cd apps/api && ./main
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: todo-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: todo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: todo-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: todo-db
          property: database

  - type: web
    name: todo-frontend
    env: static
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://todo-backend.onrender.com

databases:
  - name: todo-db
    databaseName: todos
    plan: free