apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
  namespace: todo-app
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  db-host: <BASE64_ENCODED_DB_HOST>
  db-user: <BASE64_ENCODED_DB_USER>
  db-password: <BASE64_ENCODED_DB_PASSWORD>
  db-name: <BASE64_ENCODED_DB_NAME>