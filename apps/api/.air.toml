root = "."
tmp_dir = "tmp"

[build]
  # Build the server binary from the cmd/server package into tmp/main
  cmd = "go build -o tmp/main ./cmd/server"
  # Path to the built binary to run
  bin = "tmp/main"
  # Files/dirs to include when watching for changes
  include = ["."]
  # Files/dirs to exclude
  exclude = ["tmp", "vendor"]

[logs]
  color = true
