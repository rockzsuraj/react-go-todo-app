events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    merge_slashes off;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location ~* \.(js)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files $uri $uri/ /index.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass https://react-go-todo-bx92.onrender.com;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;

            proxy_set_header Host react-go-todo-bx92.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Rewrite cookie domain from backend to frontend domain so the
            # browser stores cookies for react-springboot-full-stack.onrender.com
            proxy_cookie_domain react-go-todo-bx92.onrender.com react-springboot-full-stack.onrender.com;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
